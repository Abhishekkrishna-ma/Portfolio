<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Independent Web Creator & Creative Coder</title>
<meta name="description" content="Independent Web Creator building high-converting, premium websites for local businesses.">

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Font Awesome (icons for skills/contact) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
  :root {
    --bg: #202940;
    --bg-elevated: #121212;
    --bg-card: #151515;
    --border: #262626;
    --text-primary: #f2f2f2;
    --text-secondary: #a3a3a3;
    --text-muted: #6b6b6b;
    --accent: #64ffda;
    --accent-soft: rgba(100, 255, 218, 0.1);
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --max-width: 700px;
    --section-pad: 80px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  a { color: inherit; text-decoration: none; }
  ul { list-style: none; }
  img { max-width: 100%; display: block; }

  .container {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 0 24px;
  }

  section { padding: var(--section-pad) 0; }

  .navbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(44, 62, 80, 0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .navbar .container { display: flex; align-items: center; justify-content: space-between; height: 64px; }
  .logo { font-weight: 700; font-size: 1.05rem; letter-spacing: -0.02em; }
  .logo span { color: var(--accent); }
  .nav-links { display: none; gap: 28px; font-size: 0.85rem; font-weight: 500; color: var(--text-secondary); }
  .nav-links a { transition: color 0.2s ease; }
  .nav-links a:hover { color: var(--accent); }
  @media (min-width: 640px) { .nav-links { display: flex; } }

  .hero { min-height: 100svh; display: flex; flex-direction: column; justify-content: center; padding-top: 64px; }
  .hero-eyebrow { color: var(--accent); font-size: 0.9rem; font-weight: 600; margin-bottom: 16px; opacity: 0; animation: fadeUp 0.6s ease forwards 0.1s; }
  .hero-title { font-size: clamp(2.2rem, 8vw, 3.6rem); font-weight: 800; line-height: 1.1; letter-spacing: -0.03em; color: var(--text-primary); opacity: 0; animation: fadeUp 0.6s ease forwards 0.25s; }
  .hero-title .highlight { color: var(--text-secondary); }
  .hero-subtitle { margin-top: 20px; max-width: 480px; font-size: clamp(1rem, 3vw, 1.15rem); color: var(--text-secondary); opacity: 0; animation: fadeUp 0.6s ease forwards 0.4s; }
  .hero-cta { margin-top: 36px; opacity: 0; animation: fadeUp 0.6s ease forwards 0.55s; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .btn { display: inline-flex; align-items: center; gap: 10px; padding: 14px 28px; border-radius: 8px; font-weight: 600; font-size: 0.95rem; border: 1px solid var(--accent); color: var(--accent); background: transparent; transition: all 0.25s ease; cursor: pointer; }
  .btn:hover { background: var(--accent-soft); transform: translateY(-2px); }
  .btn-solid { background: var(--accent); color: #0a0a0a; }
  .btn-solid:hover { background: #7fffdf; }

  .section-heading { display: flex; align-items: center; gap: 14px; margin-bottom: 36px; }
  .section-number { color: var(--accent); font-family: monospace; font-size: 1rem; }
  .section-title { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; white-space: nowrap; }
  .section-line { height: 1px; background: var(--border); flex: 1; }

  .about-grid { display: grid; grid-template-columns: 1fr; gap: 36px; align-items: start; }
  @media (min-width: 700px) { .about-grid { grid-template-columns: 2fr 1fr; gap: 48px; } }
  .about-text { color: var(--text-secondary); font-size: 1rem; }
  .about-text p + p { margin-top: 16px; }
  .about-text strong { color: var(--text-primary); font-weight: 600; }

  .about-photo-wrap { position: relative; width: 100%; max-width: 240px; margin: 0 auto; }
  .about-photo-border { position: absolute; top: 16px; left: 16px; width: 100%; height: 100%; border: 2px solid var(--accent); border-radius: 8px; transition: top 0.3s ease, left 0.3s ease; z-index: 0; }
  .about-photo-wrap:hover .about-photo-border { top: 8px; left: 8px; }
  .about-photo-frame { position: relative; aspect-ratio: 1 / 1; border-radius: 8px; overflow: hidden; background: var(--bg-card); border: 1px solid var(--border); z-index: 1; }
  .about-photo-frame img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(30%) contrast(1.05); transition: filter 0.3s ease; display: block; }
  .about-photo-frame:hover img { filter: grayscale(0%) contrast(1); }
  .about-photo-frame::after { content: ""; position: absolute; inset: 0; background: var(--accent); mix-blend-mode: multiply; opacity: 0.25; transition: opacity 0.3s ease; }
  .about-photo-frame:hover::after { opacity: 0; }
  .about-photo-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 2.4rem; }

  .skills-row { display: flex; flex-wrap: wrap; gap: 12px; }
  .skill-tag { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 100px; font-size: 0.85rem; font-weight: 500; color: var(--text-secondary); transition: all 0.25s ease; }
  .skill-tag:hover { border-color: var(--accent); color: var(--text-primary); transform: translateY(-2px); }
  .skill-tag i { color: var(--accent); font-size: 0.9rem; }

  /* ============================================
     7. FEATURED PROJECTS SECTION — overlapping grid
     ============================================ */
  section#projects .container { max-width: 1000px; }

  .featured-project-list {
    display: flex;
    flex-direction: column;
    gap: 100px;
  }

  .featured-project {
    position: relative;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    align-items: center;
  }

  .featured-project-image {
    grid-column: 1 / 8;
    grid-row: 1 / -1;
    position: relative;
  }

  .featured-project-image a {
    position: relative;
    display: block;
    width: 100%;
    aspect-ratio: 16 / 10;
    border-radius: 6px;
    overflow: hidden;
    background: linear-gradient(135deg, #1a2038, #0d1120);
  }

  .featured-project-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(20%) contrast(1);
    transition: filter 0.4s ease, transform 0.4s ease;
  }

  .featured-project-image .no-image-icon {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 2rem;
  }

  .featured-project-image a::after {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--accent);
    mix-blend-mode: multiply;
    opacity: 0.45;
    transition: opacity 0.4s ease;
  }

  .featured-project-image a:hover::after {
    opacity: 0;
  }

  .featured-project-image a:hover img {
    filter: grayscale(0%) contrast(1);
    transform: scale(1.03);
  }

  .featured-project-content {
    grid-column: 6 / -1;
    grid-row: 1 / -1;
    z-index: 2;
    text-align: right;
  }

  .featured-project-label {
    color: var(--accent);
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 10px;
  }

  .featured-project-title {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 20px;
  }

  .featured-project-title a:hover { color: var(--accent); }

  .featured-project-desc {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 22px 26px;
    font-size: 0.9rem;
    color: var(--text-secondary);
    box-shadow: 0 12px 30px rgba(0,0,0,0.35);
  }

  .featured-project-tech {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 16px;
    margin-top: 20px;
    justify-content: flex-end;
    font-size: 0.75rem;
    color: var(--text-secondary);
    font-family: monospace;
  }

  .featured-project-links {
    display: flex;
    gap: 16px;
    margin-top: 20px;
    justify-content: flex-end;
    font-size: 1.1rem;
    color: var(--text-primary);
  }

  .featured-project-links a { transition: color 0.2s ease, transform 0.2s ease; }
  .featured-project-links a:hover { color: var(--accent); transform: translateY(-2px); }

  /* Even projects: image on the right, content on the left */
  .featured-project:nth-child(even) .featured-project-image {
    grid-column: 6 / -1;
  }
  .featured-project:nth-child(even) .featured-project-content {
    grid-column: 1 / 8;
    text-align: left;
  }
  .featured-project:nth-child(even) .featured-project-tech,
  .featured-project:nth-child(even) .featured-project-links {
    justify-content: flex-start;
  }

  /* Mobile / tablet: stack image and overlapping content card */
  @media (max-width: 900px) {
    section#projects .container { max-width: var(--max-width); }

    .featured-project,
    .featured-project:nth-child(even) {
      display: block;
    }

    .featured-project-image,
    .featured-project:nth-child(even) .featured-project-image {
      grid-column: unset;
      width: 100%;
    }

    .featured-project-image a::after { opacity: 0.55; }

    .featured-project-content,
    .featured-project:nth-child(even) .featured-project-content {
      grid-column: unset;
      text-align: left !important;
      position: relative;
      margin-top: -50px;
      padding: 0 4px;
    }

    .featured-project-tech,
    .featured-project-links,
    .featured-project:nth-child(even) .featured-project-tech,
    .featured-project:nth-child(even) .featured-project-links {
      justify-content: flex-start !important;
    }

    .featured-project-desc { padding: 20px; }
  }

  /* ============================================
     8. CONTACT SECTION
     ============================================ */
  .contact { text-align: center; }
  .contact-title { font-size: clamp(1.8rem, 6vw, 2.4rem); font-weight: 800; letter-spacing: -0.02em; margin-bottom: 16px; }
  .contact-title span { color: var(--accent); }
  .contact-subtitle { color: var(--text-secondary); max-width: 420px; margin: 0 auto 36px; font-size: 0.95rem; }
  .contact-buttons { display: flex; flex-direction: column; gap: 14px; max-width: 320px; margin: 0 auto; }
  @media (min-width: 480px) { .contact-buttons { flex-direction: row; max-width: none; justify-content: center; } }
  .contact-buttons .btn { justify-content: center; width: 100%; }
  @media (min-width: 480px) { .contact-buttons .btn { width: auto; } }

  footer { text-align: center; padding: 30px 0 40px; color: var(--text-muted); font-size: 0.8rem; }
  footer a { color: var(--text-secondary); font-weight: 600; }

  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="#home" class="logo">Abhi<span>shek</span></a>
    <ul class="nav-links">
      <li><a href="#about">About</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </div>
</nav>

<header class="hero" id="home">
  <div class="container">
    <p class="hero-eyebrow" id="hero-eyebrow"></p>
    <h1 class="hero-title" id="hero-title"></h1>
    <p class="hero-subtitle" id="hero-subtitle"></p>
    <div class="hero-cta">
      <a href="#contact" class="btn btn-solid">
        Let's Build Something <i class="fa-solid fa-arrow-right"></i>
      </a>
    </div>
  </div>
</header>

<section id="about">
  <div class="container">
    <div class="section-heading reveal">
      <span class="section-number">01.</span>
      <span class="section-title">About</span>
      <span class="section-line"></span>
    </div>
    <div class="about-grid">
      <div class="about-text reveal" id="about-text"></div>
      <div class="about-photo-wrap reveal" id="about-photo-wrap"></div>
    </div>
  </div>
</section>

<section id="skills">
  <div class="container">
    <div class="section-heading reveal">
      <span class="section-number">02.</span>
      <span class="section-title">Toolkit</span>
      <span class="section-line"></span>
    </div>
    <div class="skills-row reveal" id="skills-row"></div>
  </div>
</section>

<section id="projects">
  <div class="container">
    <div class="section-heading reveal">
      <span class="section-number">03.</span>
      <span class="section-title">Websites I've Built</span>
      <span class="section-line"></span>
    </div>
    <div class="featured-project-list" id="projects-grid"></div>
  </div>
</section>

<section id="contact" class="contact">
  <div class="container">
    <p class="section-number reveal" style="display:block; margin-bottom: 10px;">04. What's Next?</p>
    <h2 class="contact-title reveal" id="contact-title"></h2>
    <p class="contact-subtitle reveal" id="contact-subtitle"></p>
    <div class="contact-buttons reveal" id="contact-buttons"></div>
  </div>
</section>

<footer>
  <p id="footer-text"></p>
</footer>

<script>
const siteData = {

  brand: "A",

  hero: {
    eyebrow: "Hi, my name is",
    titleHTML: "ABHISHEK.<br><span class=\"highlight\">I build websites that grow local businesses.</span>",
    subtitle: "Independent Web Creator & Creative Coder crafting high-converting, cinematic websites for gyms, cafes, salons, and clinics."
  },

  about: {
    paragraphs: [
      "I'm a web creator who blends <strong>clean code</strong> with a sharp eye for photography, layout, and visual storytelling. I don't just build pages — I design digital experiences that make a local business feel premium the moment someone lands on it.",
      "Whether it's a gym, a café, or a salon, my focus stays the same: sleek, interactive, and professional websites that turn visitors into customers — without the technical jargon getting in the way."
    ],
    photo: ""
  },

  skills: [
    { icon: "fa-brands fa-html5", label: "HTML" },
    { icon: "fa-brands fa-css3-alt", label: "CSS" },
    { icon: "fa-brands fa-js", label: "JavaScript" },
    { icon: "fa-solid fa-mobile-screen-button", label: "Responsive Design" },
    { icon: "fa-solid fa-wand-magic-sparkles", label: "UI/UX Strategy" }
  ],

  /* ----------------------------------------------------------------
     PROJECTS — add as many objects as you like.
     Fields:
       tag        -> small "Featured Project" style label (optional override)
       name       -> project / business name
       desc       -> one or two line pitch of what was delivered
       image      -> path or URL to a screenshot (leave "" for a
                     placeholder icon instead of an image)
       tech       -> array of tech/stack labels shown under the description
       link       -> live URL of the project
       github     -> optional GitHub/repo URL. Leave "" to hide the icon.
     ---------------------------------------------------------------- */
  projects: [
    {
      tag: "Featured Project",
      name: "Annfit Studio",
      desc: "A premium, ladies-only fitness studio site with a bold dark aesthetic — built to convert local leads into memberships.",
      image: "",
      tech: ["HTML", "CSS", "JavaScript"],
      link: "#",
      github: ""
    },
    {
      tag: "Featured Project",
      name: "The Daily Grind",
      desc: "A warm, editorial-style single-pager for a neighborhood café, designed to make the menu and ambience feel irresistible.",
      image: "",
      tech: ["HTML", "CSS", "JavaScript"],
      link: "#",
      github: ""
    },
    {
      tag: "Featured Project",
      name: "Studio Lumière",
      desc: "An elegant, photography-forward site for a boutique salon — polished enough to match a high-end brand identity.",
      image: "",
      tech: ["HTML", "CSS", "JavaScript"],
      link: "#",
      github: ""
    }
    // <-- COPY ONE OF THE OBJECTS ABOVE TO ADD A NEW PROJECT -->
  ],

  contact: {
    titleHTML: "Let's Build Your <span>Digital Presence</span>",
    subtitle: "Looking to bring your business online — or give your current site a premium upgrade? I'd love to hear about it.",
    whatsappNumber: "911234567890",
    whatsappMessage: "Hi! I found your portfolio and I'm interested in a website for my business.",
    email: "hello@example.com"
  },

  footer: {
    text: "Designed & Built by Your Name · 2026"
  }
};

// --- Hero ---
document.getElementById("hero-eyebrow").textContent = siteData.hero.eyebrow;
document.getElementById("hero-title").innerHTML = siteData.hero.titleHTML;
document.getElementById("hero-subtitle").textContent = siteData.hero.subtitle;

// --- About ---
document.getElementById("about-text").innerHTML = siteData.about.paragraphs
  .map(p => `<p>${p}</p>`)
  .join("");

document.getElementById("about-photo-wrap").innerHTML = `
  <div class="about-photo-border"></div>
  <div class="about-photo-frame">
    ${siteData.about.photo
      ? `<img src="${siteData.about.photo}" alt="Portrait photo">`
      : `<div class="about-photo-placeholder"><i class="fa-solid fa-user"></i></div>`
    }
  </div>
`;

// --- Skills ---
document.getElementById("skills-row").innerHTML = siteData.skills
  .map(skill => `
    <div class="skill-tag">
      <i class="${skill.icon}"></i>
      <span>${skill.label}</span>
    </div>
  `).join("");

// --- Featured Projects ---
document.getElementById("projects-grid").innerHTML = siteData.projects
  .map(project => `
    <div class="featured-project">
      <div class="featured-project-image">
        <a href="${project.link}" target="_blank" rel="noopener">
          ${project.image
            ? `<img src="${project.image}" alt="${project.name} screenshot">`
            : `<div class="no-image-icon"><i class="fa-solid fa-image" style="font-size:1.8rem;"></i></div>`
          }
        </a>
      </div>
      <div class="featured-project-content">
        <p class="featured-project-label">${project.tag || "Featured Project"}</p>
        <h3 class="featured-project-title">
          <a href="${project.link}" target="_blank" rel="noopener">${project.name}</a>
        </h3>
        <div class="featured-project-desc">
          <p>${project.desc}</p>
        </div>
        ${project.tech && project.tech.length ? `
          <ul class="featured-project-tech">
            ${project.tech.map(t => `<li>${t}</li>`).join("")}
          </ul>
        ` : ""}
        <div class="featured-project-links">
          ${project.github ? `<a href="${project.github}" target="_blank" rel="noopener" aria-label="GitHub repo"><i class="fa-brands fa-github"></i></a>` : ""}
          <a href="${project.link}" target="_blank" rel="noopener" aria-label="Live site"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>
        </div>
      </div>
    </div>
  `).join("");

// --- Contact ---
document.getElementById("contact-title").innerHTML = siteData.contact.titleHTML;
document.getElementById("contact-subtitle").textContent = siteData.contact.subtitle;

const waLink = `https://wa.me/${siteData.contact.whatsappNumber}?text=${encodeURIComponent(siteData.contact.whatsappMessage)}`;
const mailLink = `mailto:${siteData.contact.email}`;

document.getElementById("contact-buttons").innerHTML = `
  <a href="${waLink}" class="btn btn-solid" target="_blank" rel="noopener">
    <i class="fa-brands fa-whatsapp"></i> Chat on WhatsApp
  </a>
  <a href="${mailLink}" class="btn">
    <i class="fa-solid fa-envelope"></i> Send an Email
  </a>
`;

// --- Footer ---
document.getElementById("footer-text").textContent = siteData.footer.text;

// --- Scroll reveal animation ---
const revealEls = document.querySelectorAll(".reveal");
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("visible");
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.15 });

revealEls.forEach(el => observer.observe(el));
</script>

</body>
</html>
